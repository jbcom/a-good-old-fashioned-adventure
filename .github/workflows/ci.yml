name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true

jobs:
  verify:
    name: Web, Content, and Browser Gates
    runs-on: macos-latest
    env:
      VITEST_BROWSER_HEADLESS: "false"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:browser
      - run: pnpm build
      # deployed-build E2E: play the SHIPPED bundle under the Pages subpath with
      # throttled network — the gate that catches production-only bugs the
      # dev-server tests can't (e.g. the black-ground asset-load race).
      - run: pnpm test:e2e:deployed

  android:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 21
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm cap:sync
      - run: ./gradlew :app:assembleDebug
        working-directory: android
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
